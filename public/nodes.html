<!DOCTYPE html>
<html class="dark" lang="es">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>GeoSocial Aura - Nodos</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&amp;family=JetBrains+Mono:wght@400..800&amp;family=Space+Grotesk:wght@300..700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com"></script>
<script src="tailwind-config.js?v=4"></script>
<link rel="stylesheet" href="styles.css?v=4">
<script src="app.js?v=3" defer></script>
</head>
<body class="bg-background text-on-background font-body-md min-h-screen relative overflow-x-hidden selection:bg-primary-container selection:text-on-primary-container">
<div class="fixed inset-0 scanline z-50 mix-blend-overlay"></div>

<!-- TopNavBar -->
<nav class="bg-background/80 backdrop-blur-xl docked full-width top-0 border-b border-outline-variant shadow-[0_0_15px_rgba(0,219,231,0.3)] flex justify-between items-center w-full px-margin-desktop h-16 sticky z-40">
    <div class="flex items-center gap-4 md:gap-8 overflow-hidden w-full md:w-auto">
        <div class="font-display-lg text-headline-lg-mobile md:text-headline-lg tracking-tighter text-primary animate-pulse shrink-0">AURA</div>
        <div class="flex overflow-x-auto hide-scrollbar gap-4 md:gap-6 items-center h-full w-full">
            <a class="text-on-surface-variant font-medium hover:text-primary-fixed-dim transition-colors duration-300 flex flex-col justify-center h-full text-sm md:text-base shrink-0" href="/#column-map">MAPA</a>
            <a class="text-on-surface-variant font-medium hover:text-primary-fixed-dim transition-colors duration-300 flex flex-col justify-center h-full text-sm md:text-base shrink-0" href="/#column-feed">MURO</a>
            <a class="text-on-surface-variant font-medium hover:text-primary-fixed-dim transition-colors duration-300 flex flex-col justify-center h-full text-sm md:text-base shrink-0" href="/#column-radar">RADAR</a>
            <a class="text-primary font-bold border-b-2 border-primary pb-1 flex flex-col justify-center h-full mt-1 text-sm md:text-base shrink-0" href="/nodes">NODOS</a>
        </div>
    </div>
<div class="flex items-center gap-4 text-primary relative">
<button id="btn-notifications" class="hover:text-primary-fixed-dim transition-colors duration-300 relative" title="Notificaciones">
    <span class="material-symbols-outlined">notifications</span>
    <div id="notif-badge" class="absolute top-0 right-0 w-2 h-2 bg-error rounded-full hidden shadow-[0_0_5px_red]"></div>
</button>
<div id="notif-dropdown" class="absolute top-10 right-16 w-64 bg-surface-container-high border border-outline-variant rounded shadow-lg hidden flex-col overflow-hidden z-50">
    <div class="p-2 border-b border-outline-variant text-xs font-label-caps text-outline">NOTIFICACIONES</div>
    <ul id="notif-list" class="max-h-60 overflow-y-auto flex flex-col text-sm text-on-surface">
        <li class="p-2 text-center text-outline text-xs">Sin notificaciones</li>
    </ul>
</div>

<button id="btn-settings" class="hover:text-primary-fixed-dim transition-colors duration-300" title="Ajustes">
    <span class="material-symbols-outlined">settings</span>
</button>
<button id="btn-logout" class="hover:text-error transition-colors duration-300" title="Cerrar Sesión">
    <span class="material-symbols-outlined">logout</span>
</button>
<span class="current-user-name font-status-code text-sm hidden md:inline"></span>
<div class="w-8 h-8 rounded-full bg-surface-variant overflow-hidden border border-outline-variant cursor-pointer" id="btn-avatar-settings">
<img alt="User Avatar" class="current-user-avatar w-full h-full object-cover" src=""/>
</div>
</div>
</nav>

<main class="max-w-[1280px] mx-auto px-margin-mobile md:px-margin-desktop py-8 grid grid-cols-1 md:grid-cols-12 gap-gutter relative z-10 min-h-[calc(100vh-64px)]">

<!-- User List -->
<aside class="md:col-span-5 flex flex-col gap-6">
    <div class="bg-surface-container-low/90 backdrop-blur-md rounded-lg border border-outline-variant p-4 flex flex-col h-[600px] md:h-[calc(100vh-140px)]">
        <h2 class="font-label-caps text-label-caps text-primary mb-4 pb-2 border-b border-outline-variant tracking-widest flex items-center gap-2 shrink-0">
            <span class="material-symbols-outlined">group</span> NODOS EN LA RED
        </h2>
        <ul id="nodes-list" class="flex flex-col gap-2 overflow-y-auto hide-scrollbar flex-1">
            <!-- Loaded by JS -->
        </ul>
    </div>
</aside>

<!-- Chat Window -->
<section class="md:col-span-7 flex flex-col gap-6">
    <div id="chat-window" class="hidden bg-surface-container-low/90 backdrop-blur-md rounded-lg border border-outline-variant flex-col h-[600px] md:h-[calc(100vh-140px)] overflow-hidden">
        <div class="p-4 border-b border-outline-variant bg-surface-dim/50">
            <h3 id="chat-title" class="font-status-code text-primary">CHAT</h3>
        </div>
        
        <div id="chat-messages" class="flex-1 p-4 overflow-y-auto flex flex-col hide-scrollbar">
            <!-- Loaded by JS -->
        </div>

        <div class="p-4 border-t border-outline-variant bg-surface-dim/50 flex gap-2">
            <input type="text" id="chat-input" class="flex-1 bg-surface-variant text-on-surface rounded px-3 py-2 outline-none focus:border-primary border border-transparent custom-focus-ring" placeholder="Transmite un mensaje cifrado...">
            <button id="btn-send-msg" class="bg-primary text-on-primary px-4 py-2 rounded font-status-code hover:shadow-[0_0_10px_rgba(0,219,231,0.5)] transition-all">ENVIAR</button>
        </div>
    </div>
</section>

</main>

<!-- Modal Ajustes -->
<div id="settings-modal" class="fixed inset-0 bg-background/80 backdrop-blur-sm z-50 hidden flex items-center justify-center">
    <div class="bg-surface-container-high p-6 rounded-lg border border-primary/50 shadow-[0_0_30px_rgba(0,219,231,0.2)] w-full max-w-sm">
        <h3 class="font-status-code text-primary mb-4 flex items-center gap-2"><span class="material-symbols-outlined">settings</span> AJUSTES DE NODO</h3>
        <form id="form-settings" class="flex flex-col gap-4">
            <div class="flex items-center gap-4 mb-2">
                <div class="w-16 h-16 rounded-full overflow-hidden border border-primary bg-surface-dim">
                    <img id="settings-avatar-preview" src="" class="w-full h-full object-cover">
                </div>
                <label class="cursor-pointer bg-surface-variant px-3 py-1 rounded text-xs hover:bg-primary hover:text-on-primary transition-colors text-center">
                    Cambiar Foto
                    <input type="file" id="settings-avatar-input" class="hidden" accept="image/*">
                </label>
            </div>
            <div>
                <label class="font-label-caps text-[10px] text-outline block mb-1">NOMBRE PÚBLICO</label>
                <input type="text" id="settings-name" class="w-full bg-surface-dim border border-outline-variant text-on-surface text-sm rounded px-3 py-2 outline-none focus:border-primary">
            </div>
            <div>
                <label class="font-label-caps text-[10px] text-outline block mb-1">SECTOR (MUNICIPIO)</label>
                <select id="settings-location" class="w-full bg-surface-dim border border-outline-variant text-on-surface font-label-caps text-xs rounded px-3 py-2 outline-none focus:border-primary">
                    <option value="Iribarren">IRIBARREN</option>
                    <option value="Palavecino">PALAVECINO</option>
                    <option value="Torres">TORRES</option>
                    <option value="Urdaneta">URDANETA</option>
                    <option value="Crespo">CRESPO</option>
                    <option value="Jiménez">JIMÉNEZ</option>
                    <option value="Morán">MORÁN</option>
                    <option value="Andrés Eloy Blanco">ANDRÉS ELOY BLANCO</option>
                    <option value="Simón Planas">SIMÓN PLANAS</option>
                </select>
            </div>
            <div class="flex justify-end gap-2 mt-4">
                <button type="button" id="close-settings-modal" class="px-4 py-2 text-outline hover:text-on-surface text-sm">Cerrar</button>
                <button type="submit" class="px-4 py-2 bg-primary text-on-primary rounded text-sm hover:shadow-[0_0_10px_rgba(0,219,231,0.5)]">Guardar Cambios</button>
            </div>
        </form>
    </div>
</div>
</body>

</html>
