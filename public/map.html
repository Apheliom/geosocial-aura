<!DOCTYPE html>
<html class="dark" lang="es">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>GeoSocial Aura - Mapa Global</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&amp;family=JetBrains+Mono:wght@400..800&amp;family=Space+Grotesk:wght@300..700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="styles.css">
<script>window.location.href = 'index.html#column-map';</script>
</head>
<body class="bg-background text-on-background font-body-md min-h-screen relative overflow-hidden selection:bg-primary-container selection:text-on-primary-container">
<div class="fixed inset-0 scanline z-50 mix-blend-overlay"></div>

<!-- TopNavBar -->
<nav class="bg-background/80 backdrop-blur-xl docked full-width top-0 border-b border-outline-variant shadow-[0_0_15px_rgba(0,219,231,0.3)] flex justify-between items-center w-full px-margin-desktop h-16 sticky z-40">
<div class="flex items-center gap-8">
<div class="font-display-lg text-headline-lg tracking-tighter text-primary animate-pulse">GEOSOCIAL AURA</div>
<div class="hidden md:flex gap-6 items-center h-full">
<a class="text-primary font-bold border-b-2 border-primary pb-1 flex flex-col justify-center h-full mt-1" href="map.html">MAPA</a>
<a class="text-on-surface-variant font-medium hover:text-primary-fixed-dim transition-colors duration-300 flex flex-col justify-center h-full" href="index.html">MURO</a>
<a class="text-on-surface-variant font-medium hover:text-primary-fixed-dim transition-colors duration-300 flex flex-col justify-center h-full" href="radar.html">RADAR</a>
<a class="text-on-surface-variant font-medium hover:text-primary-fixed-dim transition-colors duration-300 flex flex-col justify-center h-full" href="nodes.html">NODOS</a>
</div>
</div>
<div class="flex items-center gap-4 text-primary relative">
<button id="btn-notifications" class="hover:text-primary-fixed-dim transition-colors duration-300 relative" title="Notificaciones">
    <span class="material-symbols-outlined">notifications</span>
    <div id="notif-badge" class="absolute top-0 right-0 w-2 h-2 bg-error rounded-full hidden shadow-[0_0_5px_red]"></div>
</button>
<div id="notif-dropdown" class="absolute top-10 right-16 w-64 bg-surface-container-high border border-outline-variant rounded shadow-lg hidden flex-col overflow-hidden z-50">
    <div class="p-2 border-b border-outline-variant text-xs font-label-caps text-outline">NOTIFICACIONES</div>
    <ul id="notif-list" class="max-h-60 overflow-y-auto flex flex-col text-sm text-on-surface">
        <li class="p-2 text-center text-outline text-xs">Sin notificaciones</li>
    </ul>
</div>

<button id="btn-settings" class="hover:text-primary-fixed-dim transition-colors duration-300" title="Ajustes">
    <span class="material-symbols-outlined">settings</span>
</button>
<button id="btn-logout" class="hover:text-error transition-colors duration-300" title="Cerrar Sesión">
    <span class="material-symbols-outlined">logout</span>
</button>
<span class="current-user-name font-status-code text-sm hidden md:inline"></span>
<div class="w-8 h-8 rounded-full bg-surface-variant overflow-hidden border border-outline-variant cursor-pointer" id="btn-avatar-settings">
<img alt="User Avatar" class="current-user-avatar w-full h-full object-cover" src=""/>
</div>
</div>
</nav>

<main class="w-full h-[calc(100vh-64px)] flex justify-center items-center p-8 relative z-10">

<!-- SVG Map Abstraction Giant -->
<div class="w-full max-w-4xl aspect-video bg-surface-container-low/90 backdrop-blur-md rounded-lg border border-outline-variant overflow-hidden flex items-center justify-center p-4 relative shadow-[0_0_50px_rgba(0,0,0,0.8)] group cursor-crosshair">
    <!-- Grid background -->
    <div class="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjAiIGhlaWdodD0iMjAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PHBhdGggZD0iTTEgMWgyMHYyMEgxVjF6IiBmaWxsPSJub25lIiBzdHJva2U9InJnYmEoNTgsIDczLCA3NSwgMC4yKSIgc3Ryb2tlLXdpZHRoPSIxIi8+PC9zdmc+')] opacity-50"></div>
    <div class="absolute top-4 left-4 font-label-caps text-primary tracking-widest bg-surface-dim/80 p-2 rounded border border-primary/30 z-20">MONITOR ESTATAL EN TIEMPO REAL</div>
    <svg id="vector-map" class="w-full h-full relative z-10 drop-shadow-[0_0_10px_currentColor]" viewbox="0 0 100 100">
        <!-- Torres (Large, West) -->
        <polygon data-municipality="Torres" class="transition-all" points="5,20 30,10 40,40 10,60"></polygon>
        <!-- Urdaneta (North) -->
        <polygon data-municipality="Urdaneta" class="transition-all" points="30,10 60,5 70,30 40,40"></polygon>
        <!-- Crespo (North East) -->
        <polygon data-municipality="Crespo" class="transition-all" points="60,5 90,15 85,35 70,30"></polygon>
        <!-- Iribarren (Center) -->
        <polygon data-municipality="Iribarren" class="transition-all" points="40,40 70,30 80,50 50,65"></polygon>
        <!-- Palavecino (East of Iribarren) -->
        <polygon data-municipality="Palavecino" class="transition-all" points="70,30 85,35 95,55 80,50"></polygon>
        <!-- Jiménez (South of Urdaneta) -->
        <polygon data-municipality="Jiménez" class="transition-all" points="10,60 40,40 50,65 20,80"></polygon>
        <!-- Morán (South West) -->
        <polygon data-municipality="Morán" class="transition-all" points="5,60 20,80 30,95 5,85"></polygon>
        <!-- Andrés Eloy Blanco (South) -->
        <polygon data-municipality="Andrés Eloy Blanco" class="transition-all" points="20,80 50,65 60,85 30,95"></polygon>
        <!-- Simón Planas (South East) -->
        <polygon data-municipality="Simón Planas" class="transition-all" points="50,65 80,50 90,75 60,85"></polygon>
        
        <!-- Decoration Nodes -->
        <circle class="fill-primary animate-pulse shadow-[0_0_5px_#00f2ff]" cx="55" cy="45" r="1.5"></circle>
        <circle class="fill-error animate-ping" cx="20" cy="30" r="1.5"></circle>
    </svg>
    <div class="absolute bottom-4 right-4 flex flex-col gap-2 font-label-caps text-[10px] bg-surface-dim/80 p-3 rounded border border-outline-variant/50 z-20">
        <div class="flex items-center gap-2"><div class="w-2 h-2 rounded-full bg-error pulse-strobe shadow-[0_0_5px_#ffb4ab]"></div> <span class="text-on-surface-variant">CORTE CRÍTICO (ROJO)</span></div>
        <div class="flex items-center gap-2"><div class="w-2 h-2 rounded-full bg-primary shadow-[0_0_5px_#00f2ff]"></div> <span class="text-on-surface-variant">ESTABLE (CYAN)</span></div>
    </div>
</div>

</main>

<!-- Modal Ajustes -->
<div id="settings-modal" class="fixed inset-0 bg-background/80 backdrop-blur-sm z-50 hidden flex items-center justify-center">
    <div class="bg-surface-container-high p-6 rounded-lg border border-primary/50 shadow-[0_0_30px_rgba(0,219,231,0.2)] w-full max-w-sm">
        <h3 class="font-status-code text-primary mb-4 flex items-center gap-2"><span class="material-symbols-outlined">settings</span> AJUSTES DE NODO</h3>
        <form id="form-settings" class="flex flex-col gap-4">
            <div class="flex items-center gap-4 mb-2">
                <div class="w-16 h-16 rounded-full overflow-hidden border border-primary bg-surface-dim">
                    <img id="settings-avatar-preview" src="" class="w-full h-full object-cover">
                </div>
                <label class="cursor-pointer bg-surface-variant px-3 py-1 rounded text-xs hover:bg-primary hover:text-on-primary transition-colors text-center">
                    Cambiar Foto
                    <input type="file" id="settings-avatar-input" class="hidden" accept="image/*">
                </label>
            </div>
            <div>
                <label class="font-label-caps text-[10px] text-outline block mb-1">NOMBRE PÚBLICO</label>
                <input type="text" id="settings-name" class="w-full bg-surface-dim border border-outline-variant text-on-surface text-sm rounded px-3 py-2 outline-none focus:border-primary">
            </div>
            <div>
                <label class="font-label-caps text-[10px] text-outline block mb-1">SECTOR (MUNICIPIO)</label>
                <select id="settings-location" class="w-full bg-surface-dim border border-outline-variant text-on-surface font-label-caps text-xs rounded px-3 py-2 outline-none focus:border-primary">
                    <option value="Iribarren">IRIBARREN</option>
                    <option value="Palavecino">PALAVECINO</option>
                    <option value="Torres">TORRES</option>
                    <option value="Urdaneta">URDANETA</option>
                    <option value="Crespo">CRESPO</option>
                    <option value="Jiménez">JIMÉNEZ</option>
                    <option value="Morán">MORÁN</option>
                    <option value="Andrés Eloy Blanco">ANDRÉS ELOY BLANCO</option>
                    <option value="Simón Planas">SIMÓN PLANAS</option>
                </select>
            </div>
            <div class="flex justify-end gap-2 mt-4">
                <button type="button" id="close-settings-modal" class="px-4 py-2 text-outline hover:text-on-surface text-sm">Cerrar</button>
                <button type="submit" class="px-4 py-2 bg-primary text-on-primary rounded text-sm hover:shadow-[0_0_10px_rgba(0,219,231,0.5)]">Guardar Cambios</button>
            </div>
        </form>
    </div>
</div>
</body>

</html>
